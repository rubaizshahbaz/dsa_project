<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="logo">🧩 DSA Visualizer</a>

  <div class="container">
    <h1 class="page-title">🚶‍♂️ Queue (FIFO)</h1>
    <p class="page-desc">
      A queue works like a line at a shop: the <b>first</b> person to join is the
      <b>first</b> to be served (First In, First Out). We add at the rear and
      remove from the front.
    </p>

    <div class="controls">
      <input type="number" id="valueInput" placeholder="Value" />
      <button onclick="enqueue()">Enqueue (add rear)</button>
      <button class="danger" onclick="dequeue()">Dequeue (remove front)</button>
      <button class="secondary" onclick="peek()">Peek (see front)</button>
      <button class="secondary" onclick="clearQueue()">Clear</button>
    </div>

    <div class="viz">
      <div class="queue" id="queueArea"></div>
    </div>

    <div class="message" id="message">Enqueue a value to add it to the rear of the queue.</div>
  </div>

  <script src="../js/queue.js"></script>
</body>
</html>
